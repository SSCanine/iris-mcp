name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Tesseract OCR
        run: |
          choco install tesseract --no-progress -y
          echo "C:\Program Files\Tesseract-OCR" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Doctor check
        run: |
          python -m iris.doctor

      - name: Unit tests
        run: |
          python -m pytest tests/unit -q --tb=short

      - name: Integration tests
        run: |
          python -m pytest tests/integration -q --tb=short

      # NOTE: the live bench (iris.bench.runner) is NOT run in CI because it
      # spawns a Tk window and synthesizes real mouse input. Headless agents
      # would interfere with the host. Maintainers run it locally before
      # tagging a release.

  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: python -m pip install ruff
      - name: Lint
        run: ruff check iris/ server.py tests/
      - name: Format check
        run: ruff format --check iris/ server.py tests/
